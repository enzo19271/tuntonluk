<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Detail Film — Tunton Luk</title>
<meta name="description" content="Tunton Luk, platform streaming film. Tonton film favoritmu kapan saja." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===================== HEADER ===================== -->
  <header class="site-header">
    <div class="container header-inner">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Buka menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <a href="index.html" class="logo">Tunton<span class="accent">Luk</span></a>

      <nav class="nav-desktop">
        <a href="index.html">Beranda</a>
        <a href="#">Premium</a>
        <a href="#">About us</a>
      </nav>

      <div class="search-desktop">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchDesktop" placeholder="Cari disini......" />
        </div>
      </div>
    </div>
  </header>

  <!-- ===================== DRAWER MENU ===================== -->
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="logo">Tunton<span class="accent">Luk</span></span>
      <button class="drawer-close" id="drawerClose" aria-label="Tutup menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <nav>
      <a href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></svg>
        Beranda
      </a>
      <a href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 15 8 22 9 17 14 18 21 12 17.5 6 21 7 14 2 9 9 8 12 2Z"/></svg>
        Premium
      </a>
      <a href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="16" x2="12" y2="11"/><line x1="12" y1="8" x2="12" y2="8"/></svg>
        About us
      </a>
    </nav>
    <div class="drawer-divider"></div>
    <nav>
      <a href="admin.html" class="admin-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
        Admin
      </a>
    </nav>
    <div class="drawer-footer">Tunton Luk &copy; 2026</div>
  </aside>

  <!-- ===================== DETAIL FILM ===================== -->
  <section class="movies-section container" id="detailRoot">
    <div class="empty-state">
      <p>Memuat detail film...</p>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">&copy; 2026 Tunton Luk. Dibuat untuk keperluan demo.</div>
  </footer>

  <script src="js/storage.js"></script>
  <script src="js/drive-utils.js"></script>
  <script src="js/detail.js"></script>
  <script>
    // Drawer/hamburger sama seperti di halaman lain
    document.getElementById("hamburgerBtn")?.addEventListener("click", () => {
      document.getElementById("drawer")?.classList.add("open");
      document.getElementById("drawerOverlay")?.classList.add("open");
    });
    document.getElementById("drawerClose")?.addEventListener("click", () => {
      document.getElementById("drawer")?.classList.remove("open");
      document.getElementById("drawerOverlay")?.classList.remove("open");
    });
    document.getElementById("drawerOverlay")?.addEventListener("click", () => {
      document.getElementById("drawer")?.classList.remove("open");
      document.getElementById("drawerOverlay")?.classList.remove("open");
    });
  </script>
</body>
</html>
